name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.3"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --timeout=5m
          only-new-issues: false

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run stable test suite
        shell: bash
        run: |
          # cache package currently contains integration-style tests that are flaky
          # in the default unit-test flow. Keep main CI deterministic until those
          # tests are isolated behind explicit tags or fixed in code.
          packages=$(go list ./... | grep -v '^github.com/go-lynx/lynx/cache$')
          go test -v -race -coverprofile=coverage.out -covermode=atomic $packages

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Build CLI
        working-directory: cmd/lynx
        run: go build -o ../../bin/lynx .

      - name: Build plugins
        shell: bash
        run: |
          shopt -s nullglob
          for plugin in plugins/*/; do
            if [ -f "${plugin}go.mod" ]; then
              echo "Building plugin: $plugin"
              (
                cd "$plugin"
                go build -buildmode=plugin -o "$(basename "$plugin").so" .
              )
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynx-binaries
          path: |
            bin/
            plugins/**/*.so

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lynx-binaries

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/*
            plugins/**/*.so
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
